<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Soul Setup</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      width: 100%;
      max-width: 480px;
      padding: 40px 36px 36px;
    }

    h1 {
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #111;
      margin-bottom: 28px;
      text-align: center;
      line-height: 1.25;
    }

    h1 .welcome {
      display: block;
      font-size: 1.1rem;
      font-weight: 400;
      color: #666;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    h1 .brand {
      display: block;
      font-size: 1.9rem;
      font-weight: 700;
    }

    /* Tabs */
    .tabs {
      display: flex;
      border-bottom: 1px solid #e0e0e0;
      margin-bottom: 28px;
      gap: 4px;
    }

    .tab-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px 16px;
      font-size: 0.875rem;
      font-weight: 500;
      color: #888;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-btn:hover {
      color: #333;
    }

    .tab-btn.active {
      color: #111;
      border-bottom-color: #111;
    }

    /* Tab panels */
    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    /* Form */
    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: #555;
      margin-bottom: 6px;
      letter-spacing: 0.01em;
    }

    input[type="text"],
    input[type="datetime-local"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d4d4d4;
      border-radius: 6px;
      font-size: 0.9375rem;
      color: #111;
      background: #fafafa;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }

    input[type="text"]:focus,
    input[type="datetime-local"]:focus {
      border-color: #888;
      background: #fff;
    }

    .submit-btn {
      margin-top: 8px;
      width: 100%;
      padding: 11px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.9375rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .submit-btn:hover {
      background: #333;
    }

    .submit-btn:disabled {
      background: #888;
      cursor: not-allowed;
    }

    /* Placeholder panel */
    .placeholder {
      text-align: center;
      color: #aaa;
      font-size: 0.9rem;
      padding: 32px 0;
    }

    @media (max-width: 520px) {
      .card {
        padding: 28px 20px 24px;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>
      <span class="welcome">Welcome</span>
      <span class="brand">Mini Souls</span>
    </h1>

    <div class="tabs">
      <button class="tab-btn active" data-tab="config">Configuration</button>
      <button class="tab-btn" data-tab="tab2">Tab 2</button>
    </div>

    <div id="config" class="tab-panel active">
      <form id="config-form" onsubmit="handleSubmit(event)">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="Enter name" autocomplete="off" />
        </div>
        <div class="form-group">
          <label for="set-time">Set Time</label>
          <input type="datetime-local" id="set-time" />
        </div>
        <button type="submit" class="submit-btn">Save</button>
      </form>
    </div>

    <div id="tab2" class="tab-panel">
      <p class="placeholder">Tab 2 — coming soon</p>
    </div>
  </div>

  <script>
    // --- Tabs ---
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab).classList.add('active');
      });
    });

    function toDatetimeLocalValue(date) {
      const pad = n => String(n).padStart(2, '0');
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
    }

    const timeInput = document.getElementById('set-time');
    let timeEdited = false;

    timeInput.addEventListener('change', () => { timeEdited = true; });

    function tickClock() {
      if (!timeEdited) {
        timeInput.value = toDatetimeLocalValue(new Date());
      }
    }

    tickClock();
    setInterval(tickClock, 1000);

    async function handleSubmit(e) {
      e.preventDefault();
      const btn = e.submitter;
      const payload = { name: document.getElementById('name').value.trim(), time: timeInput.value };
      btn.disabled = true;
      btn.textContent = 'Saving…';
      try {
        const res = await fetch('/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        btn.textContent = res.ok ? 'Saved!' : 'Error!';
      } catch (err) {
        console.error(err);
        btn.textContent = 'Error!';
      } finally {
        btn.disabled = false;
        setTimeout(() => { btn.textContent = 'Save'; }, 1500);
      }
    }
  </script>

</body>
</html>
